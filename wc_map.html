<html>
<head>
    <meta charset="utf-8"/>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', sans-serif; }
        #map { height: 100vh; width: 100%; display: none; }

        /* DAY/NIGHT auto */
        body.night { background: #0d0a1a; color: #e8e8f0; }
        body.day { background: #f5f5f0; color: #111; }

        /* SIGNUP */
        #signup {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            padding: 20px;
            transition: background 0.5s;
        }
        body.night #signup { background: #0d0a1a; }
        body.day #signup { background: #f0f4ff; }

        .logo-wrap { text-align: center; }
        .logo-wrap h1 {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -2px;
        }
        body.night .logo-wrap h1 { color: white; }
        body.day .logo-wrap h1 { color: #111; }
        .logo-wrap h1 span { color: #00e5a0; }
        .slogan {
            font-size: 14px;
            font-style: italic;
            margin-top: 6px;
            color: #6b6b8a;
        }

        .gender-pick { display: flex; gap: 20px; }
        .gender-btn {
            display: flex; flex-direction: column; align-items: center;
            gap: 14px; padding: 28px 36px;
            border: 2px solid transparent;
            border-radius: 20px; cursor: pointer; transition: all 0.2s;
        }
        body.night .gender-btn { background: #13131a; border-color: #1e1e2e; }
        body.day .gender-btn { background: white; border-color: #ddd; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .gender-btn:hover { border-color: #00e5a0; transform: translateY(-4px); }
        .gender-btn img { width: 55px; height: auto; }
        body.night .gender-btn img { filter: invert(1); }
        body.day .gender-btn img { filter: none; }
        .gender-btn span {
            font-size: 13px; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase; color: #6b6b8a;
        }

        /* STATUS BAR */
        #status {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            padding: 8px 18px; border-radius: 20px;
            font-size: 13px; z-index: 1000; white-space: nowrap;
            border: 1px solid #1e1e2e;
        }
        body.night #status { background: #13131a; color: #6b6b8a; }
        body.day #status { background: white; color: #444; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        /* POPUP */
        .popup-box {
            font-family: 'Helvetica Neue', sans-serif;
            min-width: 220px;
            padding: 4px;
        }
        body.night .popup-box { color: white; }
        body.day .popup-box { color: #111; }
        .popup-name {
            font-size: 15px; font-weight: 800;
            color: #00e5a0; margin-bottom: 10px;
        }
        .report-btn {
            display: block; width: 100%;
            padding: 8px 10px; margin: 4px 0;
            border: 1px solid #2a2a3e; border-radius: 8px;
            background: transparent; color: inherit;
            font-size: 12px; cursor: pointer; text-align: left;
            transition: all 0.15s;
        }
        .report-btn:hover { border-color: #00e5a0; color: #00e5a0; }
        .report-sent { color: #00e5a0; font-size: 12px; margin-top: 6px; text-align: center; }

        /* REVIEWS */
        .review-section { margin-top: 10px; border-top: 1px solid #2a2a3e; padding-top: 10px; }
        .review-section h4 { font-size: 12px; color: #6b6b8a; margin-bottom: 6px; }
        .review-input {
            width: 100%; padding: 6px 8px;
            border: 1px solid #2a2a3e; border-radius: 8px;
            background: transparent; color: inherit;
            font-size: 12px; resize: none;
            font-family: inherit;
        }
        .review-submit {
            margin-top: 6px; padding: 7px 14px;
            background: #00e5a0; color: #000;
            border: none; border-radius: 8px;
            font-weight: 700; font-size: 12px;
            cursor: pointer; width: 100%;
        }
        .review-list { margin-top: 8px; max-height: 80px; overflow-y: auto; }
        .review-item {
            font-size: 11px; color: #6b6b8a;
            padding: 4px 0; border-bottom: 1px solid #1e1e2e;
        }

        /* NIGHT MODE TOGGLE */
        #mode-toggle {
            position: absolute; top: 12px; right: 16px;
            background: #13131a; border: 1px solid #1e1e2e;
            color: white; padding: 7px 12px;
            border-radius: 20px; font-size: 13px;
            cursor: pointer; z-index: 1000;
        }
    </style>
</head>

    function detectDayNight() {
        var hour = new Date().getHours();

        applyMode(isNight);

            var tileUrl = night
                ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';

            L.tileLayer(tileUrl, { attribution: '© OpenStreetMap' }).addTo(map);
        }
    }

    function toggleMode() {
        applyMode(!isNight);
    }

    function startMap(gender) {
        userGender = gender;
        document.getElementById('signup').style.display = 'none';
        document.getElementById('map').style.display = 'block';
        document.getElementById('status').style.display = 'block';
        document.getElementById('mode-toggle').style.display = 'block';

        detectDayNight();

        // Start centered on all Israel
        map = L.map('map').setView([31.5, 34.9], 8);

        var tileUrl = isNight
            ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
            : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';

        L.tileLayer(tileUrl, { attribution: '© OpenStreetMap' }).addTo(map);

        // Load bathrooms
        fetch(API + '/bathrooms')
            .then(r => r.json())
            .then(data => {
                data.bathrooms.forEach(function(b) {
                    // Bold outlined toilet marker
                    var color = isNight ? '#00e5a0' : '#0077ff';
                    var toiletIcon = L.divIcon({
                        html: `<div style="
                            font-size: 22px;
                            line-height: 1;
                            text-shadow:
                                0 0 3px #000,
                                0 0 6px #000,
                                1px 1px 0 #000,
                                -1px -1px 0 #000,
                                1px -1px 0 #000,
                                -1px 1px 0 #000;
                            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
                        ">🚽</div>`,
                        iconSize: [28, 28],
                        iconAnchor: [14, 14],
                        className: ''
                    });

                    var marker = L.marker([b.lat, b.lon], { icon: toiletIcon }).addTo(map);
                    marker.bindPopup(buildPopup(b), { maxWidth: 260 });
                    marker.on('popupopen', function() { loadReports(b.id); });
                });

                document.getElementById('status').innerText = `✅ ${data.count} bathrooms in Israel`;
                setTimeout(() => document.getElementById('status').style.display = 'none', 3000);
            });

        // GPS
        var gpsIcon = L.icon({
            iconUrl: gender === 'male' ? maleIcon : femaleIcon,
            iconSize: [32, 64], iconAnchor: [16, 64]
        });

        navigator.geolocation.watchPosition(function(pos) {
            var lat = pos.coords.latitude;
            var lon = pos.coords.longitude;
            if (userMarker) {
                userMarker.setLatLng([lat, lon]);
            } else {
                userMarker = L.marker([lat, lon], { icon: gpsIcon })
                    .addTo(map).bindPopup('📍 You are here');
                map.setView([lat, lon], 14);
            }
        }, function(err) {
            document.getElementById('status').innerText = '📍 ' + err.message;
        }, { enableHighAccuracy: true, timeout: 10000 });
    }

    function buildPopup(b) {
        return `
        <div class="popup-box">
            <div class="popup-name">🚽 ${b.name}</div>
            <div id="reports-${b.id}" style="font-size:11px;color:#6b6b8a;margin-bottom:8px;">Loading...</div>
            <button class="report-btn" onclick="submitReport(${b.id},${b.lat},${b.lon},'✅ Clean')">✅ Clean</button>
            <button class="report-btn" onclick="submitReport(${b.id},${b.lat},${b.lon},'🧻 No supplies')">🧻 No supplies</button>
            <button class="report-btn" onclick="submitReport(${b.id},${b.lat},${b.lon},'🔒 Locked')">🔒 Locked</button>
            <button class="report-btn" onclick="submitReport(${b.id},${b.lat},${b.lon},'🕐 Long wait')">🕐 Long wait</button>
            <button class="report-btn" onclick="submitReport(${b.id},${b.lat},${b.lon},'✨ Just cleaned')">✨ Just cleaned</button>
            <div id="sent-${b.id}"></div>
            <div class="review-section">
                <h4>💬 Reviews</h4>
                <div class="review-list" id="review-list-${b.id}">No reviews yet</div>
                <textarea class="review-input" id="review-input-${b.id}" rows="2" placeholder="Leave a review..."></textarea>
                <button class="review-submit" onclick="submitReview(${b.id})">Post Review</button>
            </div>
        </div>`;
    }

    function submitReport(id, lat, lon, status) {
        fetch(API + '/report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bathroom_id: id, lat, lon, status, gender: userGender })
        })
        .then(r => r.json())
        .then(() => {
            var el = document.getElementById('sent-' + id);
            if (el) el.innerHTML = '<div class="report-sent">✅ Report sent!</div>';
            loadReports(id);
        });
    }

    function loadReports(id) {
        fetch(API + '/reports?bathroom_id=' + id)
        .then(r => r.json())
        .then(data => {
            var el = document.getElementById('reports-' + id);
            if (!el) return;
            if (data.reports.length === 0) {
                el.innerText = 'No reports yet — be the first!';
            } else {
                var latest = data.reports[data.reports.length - 1];
                el.innerHTML = '<b>Latest:</b> ' + latest.status + ' <small style="color:#6b6b8a">' + latest.timestamp.slice(11,16) + '</small>';
            }
        });
    }

    function submitReview(id) {
        var input = document.getElementById('review-input-' + id);
        var text = input.value.trim();
        if (!text) return;

        if (!reviews[id]) reviews[id] = [];
        reviews[id].push(text);
        input.value = '';

        var list = document.getElementById('review-list-' + id);
        list.innerHTML = reviews[id].map(r =>
            '<div class="review-item">💬 ' + r + '</div>'
        ).join('');
    }
</script>
</body>
</html>
