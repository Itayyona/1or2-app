    try {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    userLat = pos.coords.latitude;
                    userLon = pos.coords.longitude;
                    var el = document.getElementById('gps-status');
                    if (el) el.innerText = '✅ Location found!';
                    setTimeout(function() {
                        var el = document.getElementById('gps-status');
                        if (el) el.style.display = 'none';
                    }, 2000);
                },
                function(err) {
                    var el = document.getElementById('gps-status');
                    if (el) el.innerText = '⚠️ Enable location for best experience';
                },
                {enableHighAccuracy: true, timeout: 15000}
            );
        }
    } catch(e) { console.log('GPS init error:', e); }

    function detectDayNight() {
        var hour = new Date().getHours();
        isNight = hour < 6 || hour >= 20;
        applyMode(isNight);
    }

    function applyMode(night) {
        isNight = night;
        document.body.className = night ? 'night' : 'day';
        document.getElementById('mode-toggle').textContent = night ? '☀️ Day' : '🌙 Night';
        if (map) {
            map.eachLayer(function(layer) { if (layer._url) map.removeLayer(layer); });
            L.tileLayer(night
                ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
                {attribution: '© OpenStreetMap'}
            ).addTo(map);
        }
    }

    function toggleMode() { applyMode(!isNight); }

    function getDistance(lat1, lon1, lat2, lon2) {
        var R = 6371000;
        var dLat = (lat2-lat1)*Math.PI/180;
        var dLon = (lon2-lon1)*Math.PI/180;
        var a = Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
        return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }

    function isNearby(batLat, batLon) {
        if (userLat===null) return false;
        return getDistance(userLat,userLon,batLat,batLon) <= PROXIMITY_METERS;
    }

    function startMap(gender) {
        try {
            userGender = gender;
            document.getElementById('signup').style.display = 'none';
            document.getElementById('map').style.display = 'block';
            document.getElementById('status').style.display = 'block';
            document.getElementById('mode-toggle').style.display = 'block';
            document.getElementById('add-btn').style.display = 'block';
            detectDayNight();
            var startLat = userLat !== null ? userLat : 31.5;
            var startLon = userLon !== null ? userLon : 34.9;
            var startZoom = userLat !== null ? 14 : 8;
            map = L.map('map').setView([startLat, startLon], startZoom);
            L.tileLayer(isNight
                ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
                {attribution: '© OpenStreetMap'}
            ).addTo(map);
            map.on('click', function(e) {
                if (addingMode) {
                    pendingLocation = e.latlng;
                    document.getElementById('add-coords').innerText = '📍 '+e.latlng.lat.toFixed(5)+', '+e.latlng.lng.toFixed(5);
                }
            });
            loadBathrooms();
            var gpsIcon = L.icon({iconUrl: gender==='male' ? maleIcon : femaleIcon, iconSize:[32,64], iconAnchor:[16,64]});
            navigator.geolocation.watchPosition(
                function(pos) {
                    userLat = pos.coords.latitude;
                    userLon = pos.coords.longitude;
                    if (userMarker) {
                        userMarker.setLatLng([userLat,userLon]);
                    } else {
                        userMarker = L.marker([userLat,userLon],{icon:gpsIcon}).addTo(map).bindPopup('📍 You are here');
                        map.setView([userLat,userLon],15);
                        document.getElementById('status').innerText = '✅ Located!';
                        setTimeout(function(){ document.getElementById('status').style.display='none'; },2000);
                    }
                },
                function(err) { console.log('GPS watch error:',err.message); },
                {enableHighAccuracy:true,timeout:15000}
            );
        } catch(e) {
            console.log('startMap error:',e);
            alert('Error: '+e.message);
        }
    }

    function loadBathrooms() {
        fetch(API+'/bathrooms')
            .then(function(r){return r.json();})
            .then(function(data){
                data.bathrooms.forEach(addBathroomMarker);
                document.getElementById('status').innerText='✅ '+data.count+' bathrooms in Israel';
                setTimeout(function(){ document.getElementById('status').style.display='none'; },3000);
            })
            .catch(function(err){
                console.log('Load error:',err);
                document.getElementById('status').innerText='❌ Could not load bathrooms';
            });
    }

    function addBathroomMarker(b) {
        var toiletIcon = L.divIcon({html:'<div style="font-size:22px;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.4));">'+(b.user_added?'🆕':'🚽')+'</div>',iconSize:[28,28],iconAnchor:[14,14],className:''});
        var marker = L.marker([b.lat,b.lon],{icon:toiletIcon}).addTo(map);
        marker.bindPopup(buildPopup(b),{maxWidth:260});
        marker.on('popupopen',function(){ loadReports(b.id); loadReviews(b.id,b.lat,b.lon); });
    }

    function buildPopup(b) {
        return '<div class="popup-box">'
            +'<div class="popup-name">🚽 '+b.name+'</div>'
            +(b.user_added?'<div class="user-added-badge">👤 User Added</div>':'')
            +'<div id="reports-'+b.id+'" style="font-size:11px;color:#6b6b8a;margin-bottom:8px;">Loading...</div>'
            +'<button class="report-btn" onclick="submitReport('+b.id+','+b.lat+','+b.lon+','✅ Clean')">✅ Clean</button>'
            +'<button class="report-btn" onclick="submitReport('+b.id+','+b.lat+','+b.lon+','🧻 No supplies')">🧻 No supplies</button>'
            +'<button class="report-btn" onclick="submitReport('+b.id+','+b.lat+','+b.lon+','🔒 Locked')">🔒 Locked</button>'
            +'<button class="report-btn" onclick="submitReport('+b.id+','+b.lat+','+b.lon+','🕐 Long wait')">🕐 Long wait</button>'
            +'<button class="report-btn" onclick="submitReport('+b.id+','+b.lat+','+b.lon+','✨ Just cleaned')">✨ Just cleaned</button>'
            +'<div id="sent-'+b.id+'"></div>'
            +'<div class="review-section"><h4>💬 Reviews</h4>'
            +'<div class="review-list" id="review-list-'+b.id+'">Loading...</div>'
            +'<div id="proximity-msg-'+b.id+'"></div>'
            +'<textarea class="review-input" id="review-input-'+b.id+'" rows="2" placeholder="Leave a review..."></textarea>'
            +'<button class="review-submit" id="review-btn-'+b.id+'" onclick="submitReview('+b.id+')">Post Review</button>'
            +'</div></div>';
    }

    function submitReport(id,lat,lon,status) {
        fetch(API+'/report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bathroom_id:id,lat:lat,lon:lon,status:status,gender:userGender})})
        .then(function(r){return r.json();}).then(function(){
            var el=document.getElementById('sent-'+id);
            if(el) el.innerHTML='<div class="report-sent">✅ Report sent!</div>';
            loadReports(id);
        });
    }

    function loadReports(id) {
        fetch(API+'/reports?bathroom_id='+id)
        .then(function(r){return r.json();})
        .then(function(data){
            var el=document.getElementById('reports-'+id);
            if(!el) return;
            if(data.reports.length===0){ el.innerText='No reports yet — be the first!'; }
            else{
                var latest=data.reports[data.reports.length-1];
                el.innerHTML='<b>Latest:</b> '+latest.status+' <small style="color:#6b6b8a">'+latest.timestamp.slice(11,16)+'</small>';
            }
        });
    }

    function loadReviews(id,batLat,batLon) {
        var nearby=isNearby(batLat,batLon);
        var msgEl=document.getElementById('proximity-msg-'+id);
        var btnEl=document.getElementById('review-btn-'+id);
        var inputEl=document.getElementById('review-input-'+id);
        if(msgEl&&btnEl){
            if(!nearby){
                msgEl.innerHTML='<div class="proximity-warning">📍 Must be within 200m to review</div>';
                btnEl.disabled=true;
                if(inputEl) inputEl.disabled=true;
            }else{
                msgEl.innerHTML='<div style="font-size:11px;color:#00e5a0;margin-bottom:4px;">✅ You are nearby!</div>';
                btnEl.disabled=false;
                if(inputEl) inputEl.disabled=false;
            }
        }
        fetch(API+'/reviews/'+id)
        .then(function(r){return r.json();})
        .then(function(data){
            var el=document.getElementById('review-list-'+id);
            if(!el) return;
            if(data.reviews.length===0){ el.innerText='No reviews yet'; }
            else{ el.innerHTML=data.reviews.slice(-3).reverse().map(function(r){return '<div class="review-item">'+(r.gender==='male'?'🚹':'🚺')+' '+r.text+'</div>';}).join(''); }
        });
    }

    function submitReview(id) {
        var input=document.getElementById('review-input-'+id);
        var text=input.value.trim();
        if(!text) return;
        fetch(API+'/review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bathroom_id:id,text:text,gender:userGender})})
        .then(function(r){return r.json();}).then(function(){ input.value=''; loadReviews(id); });
    }

    function showAddModal() {
        addingMode=true; pendingLocation=null;
        document.getElementById('add-modal').style.display='block';
        document.getElementById('add-coords').innerText='📍 Tap map to set location';
        document.getElementById('add-name').value='';
        document.getElementById('add-note').value='';
    }

    function hideAddModal() {
        addingMode=false;
        document.getElementById('add-modal').style.display='none';
    }

    function confirmAddBathroom() {
        if(!pendingLocation){ alert('Please tap the map first!'); return; }
        var name=document.getElementById('add-name').value.trim()||'Public Toilet';
        var note=document.getElementById('add-note').value.trim();
        fetch(API+'/bathroom/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lat:pendingLocation.lat,lon:pendingLocation.lng,name:name,note:note})})
        .then(function(r){return r.json();}).then(function(data){ addBathroomMarker(data.bathroom); hideAddModal(); });
    }
</script>
